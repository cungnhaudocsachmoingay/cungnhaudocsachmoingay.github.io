<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đọc sách hay mỗi ngày</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: { 50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',400:'#c084fc',500:'#a855f7',600:'#9333ea',700:'#7e22ce',800:'#6b21a8',900:'#581c87' },
            warm: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="font-body bg-gray-50 text-gray-800 min-h-screen">

  <!-- Navigation -->
  <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
          <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-primary-700 rounded-xl flex items-center justify-center">
            <i data-lucide="book-open" class="w-5 h-5 text-white"></i>
          </div>
          <span class="font-display text-xl font-bold bg-gradient-to-r from-primary-600 to-primary-800 bg-clip-text text-transparent">Đọc sách hay mỗi ngày</span>
        </div>
        <div class="hidden md:flex items-center gap-1">
          <button onclick="navigateTo('home')" class="nav-link active px-4 py-2 rounded-xl text-sm font-medium transition-all" data-page="home">
            <i data-lucide="home" class="w-4 h-4 inline mr-1"></i>Trang chủ
          </button>
          <button onclick="navigateTo('categories')" class="nav-link px-4 py-2 rounded-xl text-sm font-medium transition-all" data-page="categories">
            <i data-lucide="grid-3x3" class="w-4 h-4 inline mr-1"></i>Thể loại
          </button>
          <button onclick="navigateTo('weekly')" class="nav-link px-4 py-2 rounded-xl text-sm font-medium transition-all" data-page="weekly">
            <i data-lucide="star" class="w-4 h-4 inline mr-1"></i>Sách trong tuần
          </button>
          <button onclick="navigateTo('mybooks')" class="nav-link px-4 py-2 rounded-xl text-sm font-medium transition-all" data-page="mybooks">
            <i data-lucide="bookmark" class="w-4 h-4 inline mr-1"></i>Đã đọc
            <span id="readCount" class="hidden ml-1 px-1.5 py-0.5 bg-primary-500 text-white text-xs rounded-full">0</span>
          </button>
        </div>
        <div class="flex items-center gap-3">
          <div class="relative hidden sm:block">
            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input id="searchInput" type="text" placeholder="Tìm kiếm sách..." 
              class="pl-10 pr-4 py-2 bg-gray-100 rounded-xl text-sm w-48 lg:w-64 focus:outline-none focus:ring-2 focus:ring-primary-300 focus:bg-white transition-all"
              oninput="handleSearch(this.value)">
          </div>
          <button onclick="toggleMobileMenu()" class="md:hidden p-2 rounded-xl hover:bg-gray-100">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </div>
    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden border-t border-gray-100 bg-white/95 backdrop-blur-xl">
      <div class="px-4 py-3 space-y-1">
        <div class="relative mb-3 sm:hidden">
          <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" placeholder="Tìm kiếm sách..." 
            class="pl-10 pr-4 py-2 bg-gray-100 rounded-xl text-sm w-full focus:outline-none focus:ring-2 focus:ring-primary-300"
            oninput="handleSearch(this.value)">
        </div>
        <button onclick="navigateTo('home');toggleMobileMenu()" class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium hover:bg-primary-50 hover:text-primary-600 transition-all">
          <i data-lucide="home" class="w-4 h-4 inline mr-2"></i>Trang chủ
        </button>
        <button onclick="navigateTo('categories');toggleMobileMenu()" class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium hover:bg-primary-50 hover:text-primary-600 transition-all">
          <i data-lucide="grid-3x3" class="w-4 h-4 inline mr-2"></i>Thể loại
        </button>
        <button onclick="navigateTo('weekly');toggleMobileMenu()" class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium hover:bg-primary-50 hover:text-primary-600 transition-all">
          <i data-lucide="star" class="w-4 h-4 inline mr-2"></i>Sách trong tuần
        </button>
        <button onclick="navigateTo('mybooks');toggleMobileMenu()" class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium hover:bg-primary-50 hover:text-primary-600 transition-all">
          <i data-lucide="bookmark" class="w-4 h-4 inline mr-2"></i>Đã đọc
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main id="mainContent" class="pt-16">
    <!-- Pages will be rendered here -->
  </main>

  <!-- Book Detail Modal -->
  <div id="bookModal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeBookModal()"></div>
    <div class="absolute inset-y-0 right-0 w-full max-w-3xl bg-white shadow-2xl overflow-y-auto modal-slide">
      <div id="bookModalContent"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 z-[200] hidden">
    <div class="flex items-center gap-3 px-5 py-3 bg-gray-900 text-white rounded-2xl shadow-2xl text-sm font-medium toast-enter">
      <i data-lucide="check-circle" class="w-5 h-5 text-green-400"></i>
      <span id="toastMessage"></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
